<!DOCTYPE html>
<html>
<head>
<title>UniFest Registration</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #74ebd5, #ACB6E5);
  text-align: center;
}

.container {
  background: white;
  width: 300px;
  margin: 80px auto;
  padding: 20px;
  border-radius: 10px;
}

input, select, button {
  width: 90%;
  padding: 10px;
  margin: 8px;
}

button {
  background: #4CAF50;
  color: white;
  border: none;
}

h1 {
  margin-top: 40px;
}
</style>

</head>

<body>

<h1>🎓 UniFest Registration</h1>
<h3>Register for your favorite college events</h3>

<div class="container">

<form id="form">
  <input type="text" id="name" placeholder="Full Name" required>

  <select id="event">
    <option>Select Event</option>
    <option>Tech Fest</option>
    <option>Cultural Night</option>
    <option>AI Workshop</option>
    <option>Hackathon</option>
    <option>Sports Meet</option>
  </select>

  <button type="submit">Register</button>
</form>

<p id="msg"></p>

<h4>Registrations</h4>
<ul id="list"></ul>

</div>

<script>
document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const event = document.getElementById("event").value;

  await fetch("http://localhost:3000/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({name, event})
  });

  document.getElementById("msg").innerText = "Registration Successful!";
  loadData();
};

async function loadData(){
  const res = await fetch("http://localhost:3000/data");
  const data = await res.json();

  let list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(d => {
    let li = document.createElement("li");
    li.innerText = d.name + " - " + d.event;
    list.appendChild(li);
  });
}

loadData();
</script>

</body>
</html>
